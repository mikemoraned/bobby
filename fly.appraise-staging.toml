app = "bobby-appraisals-staging"

[build]
image = "ghcr.io/mikemoraned/bobby/skeet-appraise:latest"
primary_region = "lhr"

[processes]
app = "skeet-appraise --store-path s3://hom-bobby/encrypted-store --bind 0.0.0.0:8080 --use-redis --model-path /etc/bobby/refine.toml --publish quality-48h --publish quality-7d --publish recency-48h"

[env]
RUST_LOG = "skeet_appraise=info,skeet_store=info"
OTEL_EXPORTER_OTLP_PROTOCOL = "http/protobuf"
OTEL_SERVICE_NAME = "skeet-appraise"

[http_service]
processes = ["app"]
internal_port = 8080
force_https = true
auto_stop_machines = "suspend"
auto_start_machines = true
min_machines_running = 0

[[http_service.checks]]
grace_period = "10s"
interval = "30s"
method = "GET"
timeout = "5s"
path = "/"

[[vm]]
size = "shared-cpu-1x"
memory = "512mb"
