apiVersion: apps/v1
kind: Deployment
metadata:
  name: pruner
  namespace: production
  labels:
    app: pruner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pruner
  template:
    metadata:
      labels:
        app: pruner
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: pruner
          image: ghcr.io/mikemoraned/bobby/pruner:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          command: ["pruner"]
          args:
            - "--config-path"
            - "/etc/bobby/prune.toml"
            - "--store-path"
            - "s3://hom-bobby/encrypted-store"
            - "--allow-shared-store-write"
          env:
            - name: BOBBY_S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: bobby-r2-endpoint
                  key: password
            - name: BOBBY_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: bobby-r2-access-key-id
                  key: password
            - name: BOBBY_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: bobby-r2-secret-access-key
                  key: password
            - name: BOBBY_SSE_C_KEY
              valueFrom:
                secretKeyRef:
                  name: bobby-sse-c-key
                  key: password
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: bobby-grafana-oltp-endpoint
                  key: password
            - name: OTEL_EXPORTER_OTLP_HEADERS
              valueFrom:
                secretKeyRef:
                  name: bobby-grafana-oltp-headers
                  key: password
            - name: OTEL_SERVICE_NAME
              value: "skeet-prune"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=hetzner,service.version=${IMAGE_TAG}"
            - name: RUST_LOG
              value: "info"
