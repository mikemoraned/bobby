apiVersion: apps/v1
kind: Deployment
metadata:
  name: skeet-publish
  namespace: production
  labels:
    app: skeet-publish
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skeet-publish
  template:
    metadata:
      labels:
        app: skeet-publish
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: skeet-publish
          image: ghcr.io/mikemoraned/bobby/skeet-publish:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          command: ["skeet-publish"]
          args:
            - "--model-path"
            - "/etc/bobby/refine.toml"
            - "--store-path"
            - "s3://hom-bobby/encrypted-store"
            - "--publish"
            - "recency-48h"
            - "--publish"
            - "quality-48h"
            - "--publish"
            - "quality-7d"
          env:
            - name: BOBBY_S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: bobby-r2-endpoint
                  key: password
            - name: BOBBY_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: bobby-r2-access-key-id
                  key: password
            - name: BOBBY_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: bobby-r2-secret-access-key
                  key: password
            - name: BOBBY_SSE_C_KEY
              valueFrom:
                secretKeyRef:
                  name: bobby-sse-c-key
                  key: password
            - name: BOBBY_REDIS_PUBLISH_URL
              valueFrom:
                secretKeyRef:
                  name: bobby-redis-publish-url
                  key: password
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: bobby-grafana-oltp-endpoint
                  key: password
            - name: OTEL_EXPORTER_OTLP_HEADERS
              valueFrom:
                secretKeyRef:
                  name: bobby-grafana-oltp-headers
                  key: password
            - name: OTEL_SERVICE_NAME
              value: "skeet-publish"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=hetzner,service.version=${IMAGE_TAG}"
            - name: RUST_LOG
              value: "info"
