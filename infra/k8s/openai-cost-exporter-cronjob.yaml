apiVersion: batch/v1
kind: CronJob
metadata:
  name: openai-cost-exporter
  labels:
    app: openai-cost-exporter
spec:
  schedule: "0 0 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: openai-cost-exporter
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: ghcr-pull-secret
          containers:
            - name: openai-cost-exporter
              image: ghcr.io/mikemoraned/bobby/openai-exporter:${IMAGE_TAG}
              imagePullPolicy: IfNotPresent
              command: ["sync_costs"]
              resources:
                requests:
                  memory: "64Mi"
                limits:
                  memory: "128Mi"
              env:
                - name: BOBBY_OPENAI_ADMIN_KEY
                  valueFrom:
                    secretKeyRef:
                      name: bobby-openai-admin-usage-key
                      key: password
                - name: BOBBY_PROM_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: bobby-grafanacloud-prom-endpoint
                      key: password
                - name: BOBBY_PROM_AUTH
                  valueFrom:
                    secretKeyRef:
                      name: bobby-grafanacloud-prom-auth
                      key: password
                - name: RUST_LOG
                  value: "info"
