apiVersion: apps/v1
kind: Deployment
metadata:
  name: live-refine
  labels:
    app: live-refine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: live-refine
  template:
    metadata:
      labels:
        app: live-refine
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: live-refine
          image: ghcr.io/mikemoraned/bobby/live-refine:latest
          command: ["live-refine"]
          args:
            - "--model-path"
            - "/etc/bobby/refine.toml"
            - "--store-path"
            - "s3://hom-bobby/encrypted-store"
          env:
            - name: BOBBY_S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: bobby-r2-endpoint
                  key: password
            - name: BOBBY_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: bobby-r2-access-key-id
                  key: password
            - name: BOBBY_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: bobby-r2-secret-access-key
                  key: password
            - name: BOBBY_SSE_C_KEY
              valueFrom:
                secretKeyRef:
                  name: bobby-sse-c-key
                  key: password
            - name: BOBBY_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bobby-openai-api-key
                  key: password
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "https://api.honeycomb.io"
            - name: HONEYCOMB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bobby-otel-headers
                  key: password
            - name: OTEL_EXPORTER_OTLP_HEADERS
              value: "x-honeycomb-team=$(HONEYCOMB_API_KEY)"
            - name: OTEL_SERVICE_NAME
              value: "skeet-live-refine"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=hetzner"
            - name: RUST_LOG
              value: "info"
