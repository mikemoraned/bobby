apiVersion: batch/v1
kind: CronJob
metadata:
  name: optimise
  namespace: production
  labels:
    app: optimise
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: optimise
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: ghcr-pull-secret
          containers:
            - name: optimise
              image: ghcr.io/mikemoraned/bobby/optimise:${IMAGE_TAG}
              imagePullPolicy: IfNotPresent
              command: ["optimise"]
              args:
                - "--store-path"
                - "s3://hom-bobby/encrypted-store"
              resources:
                requests:
                  memory: "1Gi"
                limits:
                  memory: "2Gi"
              env:
                - name: BOBBY_S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: bobby-r2-endpoint
                      key: password
                - name: BOBBY_S3_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: bobby-r2-access-key-id
                      key: password
                - name: BOBBY_S3_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: bobby-r2-secret-access-key
                      key: password
                - name: BOBBY_SSE_C_KEY
                  valueFrom:
                    secretKeyRef:
                      name: bobby-sse-c-key
                      key: password
                - name: OTEL_EXPORTER_OTLP_PROTOCOL
                  value: "http/protobuf"
                - name: OTEL_EXPORTER_OTLP_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: bobby-grafana-oltp-endpoint
                      key: password
                - name: OTEL_EXPORTER_OTLP_HEADERS
                  valueFrom:
                    secretKeyRef:
                      name: bobby-grafana-oltp-headers
                      key: password
                - name: OTEL_SERVICE_NAME
                  value: "optimise"
                - name: OTEL_RESOURCE_ATTRIBUTES
                  value: "deployment.environment=hetzner,service.version=${IMAGE_TAG}"
                - name: RUST_LOG
                  value: "info"
