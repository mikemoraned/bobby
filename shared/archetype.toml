# Face area thresholds as percentage of total image area.
# Faces smaller than min or larger than max are rejected.
min_face_area_pct = 5.0
max_face_area_pct = 35.0

# Skin detection thresholds.
# Minimum percentage of skin pixels within the face bounding box.
min_face_skin_pct = 30.0
# Maximum percentage of skin pixels outside the face bounding box.
max_outside_face_skin_pct = 15.0

# Maximum number of detected text word regions before rejecting.
max_glyphs_allowed = 45
