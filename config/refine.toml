model_provider = "openai"
model_name = "gpt-4o"
prompt = """
Score the image between 0.0 (worst) and 1.0 (best) based on how well it matches these criteria:
- Contains exactly one person taking a selfie (face visible, looking at the camera)
- A recognizable physical landmark is clearly visible in the background
- Good composition: both the person and the landmark are clearly visible and well-framed
- The image is a genuine selfie (not a professional photo, not a screenshot, not a meme)
- The selfie should not appear overly edited or altered
- The image should not contain any distracting elements that detract from the focus on the person and the landmark

A score of 1.0 means a perfect selfie with a clearly recognizable landmark, meeting all criteria. A score of 0.0 means the image has nothing to do with selfies or landmarks.

Consider the following when scoring:
- Ensure the landmark is easily identifiable and not obscured.
- Verify the selfie is taken by the person in the image, not by someone else.
- Check for natural lighting and minimal use of filters or digital enhancements.
- Avoid scoring high if the image includes multiple people or if the landmark is not prominent.
- Pay attention to the authenticity of the selfie; it should not look staged or professionally taken.
- Ensure the image is not overly cluttered or contains elements that distract from the main subjects.
- Be cautious of images that appear to be overly polished or edited, as they may not reflect a genuine selfie.
- Consider the overall balance and harmony of the image, ensuring both the person and landmark are given equal focus.
- Prioritize images where the landmark is a significant and recognizable feature, not just a minor background element.
- Ensure the person is clearly the one taking the selfie, with visible arm or selfie stick if applicable."""
decision_threshold = 0.5
