<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Bobby — selfies with landmarks</title>
        <style>
            body {
                font-family: system-ui, sans-serif;
                max-width: 1200px;
                margin: 2rem auto;
                padding: 0 1rem;
                color: #222;
            }
            h1 {
                text-align: center;
                font-weight: 600;
                margin-bottom: 0.25rem;
            }
            p.tagline {
                text-align: center;
                color: #666;
                margin-top: 0;
            }
            p.empty {
                text-align: center;
                color: #666;
                margin-top: 3rem;
            }
            /* Masonry via CSS multi-column: each image keeps its own aspect
               ratio (no cropping) and the browser picks the column count from
               the available width. */
            .grid {
                column-width: 240px;
                column-gap: 12px;
            }
            .grid a {
                display: block;
                margin: 0 0 12px;
                break-inside: avoid;
                -webkit-column-break-inside: avoid;
                border-radius: 8px;
                overflow: hidden;
                background: #f2f2f2;
            }
            .grid img {
                width: 100%;
                height: auto;
                display: block;
                transition: transform 0.15s ease;
            }
            .grid a:hover img {
                transform: scale(1.03);
            }
        </style>
    </head>
    <body>
        <h1>Bobby</h1>
        <p class="tagline">Selfies people take with landmarks, found on Bluesky.</p>
{% if cards.is_empty() %}
        <p class="empty">No selfies found just yet — check back soon.</p>
{% else %}
        <div class="grid">
{% for card in cards %}
            <a href="{{ card.bsky_url }}"><img src="{{ card.thumb_url }}" loading="lazy" alt="{{ card.alt }}"></a>
{% endfor %}
        </div>
{% endif %}
    </body>
</html>
